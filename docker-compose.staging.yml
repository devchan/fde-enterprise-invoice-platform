# Staging deployment overlay.
#
# Mirrors docker-compose.prod.yml but targets the staging environment and runs a
# single replica of each service. Use with the staging env file:
#
#   docker compose --env-file .env.staging.example -f docker-compose.staging.yml up -d
#
# Postgres and Redis run in-container here for a self-contained staging stack; in
# a managed staging environment point DATABASE_URL/REDIS_URL at managed services
# and drop the postgres/redis services.
services:
  backend:
    image: ${BACKEND_IMAGE:-invoice-platform-backend:staging}
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    environment:
      APP_NAME: ${APP_NAME:-FDE Enterprise Invoice Platform}
      APP_ENV: ${APP_ENV:?APP_ENV is required}
      APP_DEBUG: ${APP_DEBUG:-false}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_EXTRACTION_MODEL: ${OPENAI_EXTRACTION_MODEL:-gpt-4.1}
      OPENAI_INPUT_COST_PER_MILLION_TOKENS: ${OPENAI_INPUT_COST_PER_MILLION_TOKENS:-0}
      OPENAI_OUTPUT_COST_PER_MILLION_TOKENS: ${OPENAI_OUTPUT_COST_PER_MILLION_TOKENS:-0}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_EXTRACTION_MODEL: ${GEMINI_EXTRACTION_MODEL:-gemini-flash-latest}
      GEMINI_INPUT_COST_PER_MILLION_TOKENS: ${GEMINI_INPUT_COST_PER_MILLION_TOKENS:-0}
      GEMINI_OUTPUT_COST_PER_MILLION_TOKENS: ${GEMINI_OUTPUT_COST_PER_MILLION_TOKENS:-0}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:?OBJECT_STORAGE_BUCKET is required}
      OBJECT_STORAGE_BACKEND: ${OBJECT_STORAGE_BACKEND:-local}
      OBJECT_STORAGE_LOCAL_PATH: ${OBJECT_STORAGE_LOCAL_PATH:-/app/.local-storage}
      OBJECT_STORAGE_ENDPOINT_URL: ${OBJECT_STORAGE_ENDPOINT_URL:-}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-us-east-1}
      OBJECT_STORAGE_ACCESS_KEY_ID: ${OBJECT_STORAGE_ACCESS_KEY_ID:-}
      OBJECT_STORAGE_SECRET_ACCESS_KEY: ${OBJECT_STORAGE_SECRET_ACCESS_KEY:-}
      INVOICE_UPLOAD_MAX_BYTES: ${INVOICE_UPLOAD_MAX_BYTES:-10485760}
      UPLOAD_RATE_LIMIT_ENABLED: ${UPLOAD_RATE_LIMIT_ENABLED:-true}
      UPLOAD_RATE_LIMIT_REQUESTS: ${UPLOAD_RATE_LIMIT_REQUESTS:-20}
      UPLOAD_RATE_LIMIT_WINDOW_SECONDS: ${UPLOAD_RATE_LIMIT_WINDOW_SECONDS:-60}
      LOGIN_RATE_LIMIT_ENABLED: ${LOGIN_RATE_LIMIT_ENABLED:-true}
      LOGIN_RATE_LIMIT_REQUESTS: ${LOGIN_RATE_LIMIT_REQUESTS:-10}
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:-300}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required}
      INVOICE_FILE_DOWNLOAD_URL_TTL_SECONDS: ${INVOICE_FILE_DOWNLOAD_URL_TTL_SECONDS:-300}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ACCESS_TOKEN_TTL_SECONDS: ${JWT_ACCESS_TOKEN_TTL_SECONDS:-3600}
      RUN_MIGRATIONS_ON_START: ${RUN_MIGRATIONS_ON_START:-true}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - invoice_storage:/app/.local-storage
    entrypoint: ["sh", "/app/infra/docker/backend-entrypoint.sh"]
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--app-dir", "/app/backend"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    image: ${BACKEND_IMAGE:-invoice-platform-backend:staging}
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    environment:
      APP_NAME: ${APP_NAME:-FDE Enterprise Invoice Platform}
      APP_ENV: ${APP_ENV:?APP_ENV is required}
      APP_DEBUG: ${APP_DEBUG:-false}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_EXTRACTION_MODEL: ${OPENAI_EXTRACTION_MODEL:-gpt-4.1}
      OPENAI_INPUT_COST_PER_MILLION_TOKENS: ${OPENAI_INPUT_COST_PER_MILLION_TOKENS:-0}
      OPENAI_OUTPUT_COST_PER_MILLION_TOKENS: ${OPENAI_OUTPUT_COST_PER_MILLION_TOKENS:-0}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_EXTRACTION_MODEL: ${GEMINI_EXTRACTION_MODEL:-gemini-flash-latest}
      GEMINI_INPUT_COST_PER_MILLION_TOKENS: ${GEMINI_INPUT_COST_PER_MILLION_TOKENS:-0}
      GEMINI_OUTPUT_COST_PER_MILLION_TOKENS: ${GEMINI_OUTPUT_COST_PER_MILLION_TOKENS:-0}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:?OBJECT_STORAGE_BUCKET is required}
      OBJECT_STORAGE_BACKEND: ${OBJECT_STORAGE_BACKEND:-local}
      OBJECT_STORAGE_LOCAL_PATH: ${OBJECT_STORAGE_LOCAL_PATH:-/app/.local-storage}
      OBJECT_STORAGE_ENDPOINT_URL: ${OBJECT_STORAGE_ENDPOINT_URL:-}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-us-east-1}
      OBJECT_STORAGE_ACCESS_KEY_ID: ${OBJECT_STORAGE_ACCESS_KEY_ID:-}
      OBJECT_STORAGE_SECRET_ACCESS_KEY: ${OBJECT_STORAGE_SECRET_ACCESS_KEY:-}
      INVOICE_UPLOAD_MAX_BYTES: ${INVOICE_UPLOAD_MAX_BYTES:-10485760}
      UPLOAD_RATE_LIMIT_ENABLED: ${UPLOAD_RATE_LIMIT_ENABLED:-true}
      UPLOAD_RATE_LIMIT_REQUESTS: ${UPLOAD_RATE_LIMIT_REQUESTS:-20}
      UPLOAD_RATE_LIMIT_WINDOW_SECONDS: ${UPLOAD_RATE_LIMIT_WINDOW_SECONDS:-60}
      LOGIN_RATE_LIMIT_ENABLED: ${LOGIN_RATE_LIMIT_ENABLED:-true}
      LOGIN_RATE_LIMIT_REQUESTS: ${LOGIN_RATE_LIMIT_REQUESTS:-10}
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:-300}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required}
      INVOICE_FILE_DOWNLOAD_URL_TTL_SECONDS: ${INVOICE_FILE_DOWNLOAD_URL_TTL_SECONDS:-300}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ACCESS_TOKEN_TTL_SECONDS: ${JWT_ACCESS_TOKEN_TTL_SECONDS:-3600}
      RUN_MIGRATIONS_ON_START: "false"
      PROCESSING_QUEUE_NAME: ${PROCESSING_QUEUE_NAME:-invoice_processing_jobs}
      PROCESSING_RETRY_QUEUE_NAME: ${PROCESSING_RETRY_QUEUE_NAME:-invoice_processing_jobs:delayed}
      WORKER_POLL_TIMEOUT_SECONDS: ${WORKER_POLL_TIMEOUT_SECONDS:-5}
      WORKER_SLEEP_SECONDS: ${WORKER_SLEEP_SECONDS:-1}
      PROCESSING_JOB_MAX_ATTEMPTS: ${PROCESSING_JOB_MAX_ATTEMPTS:-3}
      PROCESSING_JOB_RETRY_BACKOFF_SECONDS: ${PROCESSING_JOB_RETRY_BACKOFF_SECONDS:-30}
    volumes:
      - invoice_storage:/app/.local-storage
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["python", "-m", "app.worker"]

  frontend:
    image: ${FRONTEND_IMAGE:-invoice-platform-frontend:staging}
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: production
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:?VITE_API_BASE_URL is required}
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    ports:
      - "${FRONTEND_PORT:-3000}:8080"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-invoice_platform_staging}
      POSTGRES_USER: ${POSTGRES_USER:-invoice_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-invoice_user} -d ${POSTGRES_DB:-invoice_platform_staging}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  invoice_storage:
