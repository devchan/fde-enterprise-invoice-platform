name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint and type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ruff lint (backend + tests)
        run: |
          pip install ruff==0.8.6
          ruff check backend tests

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check frontend
        working-directory: frontend
        run: npm run typecheck

      - name: Frontend unit tests
        working-directory: frontend
        run: npm run test

  security:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Blocking gate: backend dependencies are CVE-clean after the FastAPI /
      # Starlette upgrade, so a newly-introduced advisory should fail the build.
      - name: pip-audit (backend dependencies)
        run: |
          pip install pip-audit==2.7.3
          pip-audit -r backend/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Advisory: the reported findings are build-time tooling (vite/esbuild/
      # postcss) that is not shipped in the production static image.
      - name: npm audit (frontend dependencies)
        continue-on-error: true
        working-directory: frontend
        run: npm audit --audit-level=high

  backend:
    name: Backend Docker tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start stack
        run: docker compose up -d --build

      - name: Verify compose services
        run: docker compose ps

      - name: Run release checks
        run: scripts/check-release.sh

      - name: Show service logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop stack
        if: always()
        run: docker compose down -v
