# Dev-only Secret values for the local kind overlay. These override the base
# example Secret and point at the in-cluster Postgres/Redis. JWT_SECRET is a
# throwaway; APP_ENV=local means the production-like secret guard is not applied.
# DO NOT use these values anywhere real.
apiVersion: v1
kind: Secret
metadata:
  name: invoice-platform-secrets
stringData:
  JWT_SECRET: "local-kind-dev-secret-0123456789abcdef0123456789"
  DATABASE_URL: "postgresql+psycopg://invoice_user:invoice_pass@postgres:5432/invoice_platform"
  REDIS_URL: "redis://redis:6379/0"
  OPENAI_API_KEY: ""
  GEMINI_API_KEY: ""
  OBJECT_STORAGE_ACCESS_KEY_ID: ""
  OBJECT_STORAGE_SECRET_ACCESS_KEY: ""
