apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Local kind validation overlay. Unlike staging/production (which assume
# EXTERNAL managed Postgres/Redis), this overlay is self-contained: it deploys
# in-cluster Postgres + Redis, a dev Secret, local object storage, and
# APP_ENV=local (which skips the production-like JWT-secret startup guard).
#
# For local validation only — never point this at a real environment.
namespace: invoice-platform-local

resources:
  - ../../base
  - postgres.yaml
  - redis.yaml

images:
  - name: invoice-platform-backend
    newTag: local
  - name: invoice-platform-frontend
    newTag: local

replicas:
  - name: backend
    count: 1
  - name: worker
    count: 1
  - name: frontend
    count: 1

patches:
  - target:
      kind: ConfigMap
      name: invoice-platform-config
    patch: |-
      - op: replace
        path: /data/APP_ENV
        value: local
      - op: replace
        path: /data/OBJECT_STORAGE_BACKEND
        value: local
      - op: replace
        path: /data/CORS_ALLOWED_ORIGINS
        value: http://localhost:8081
  # Override the example Secret with values wired to the in-cluster services.
  - path: secret-patch.yaml
