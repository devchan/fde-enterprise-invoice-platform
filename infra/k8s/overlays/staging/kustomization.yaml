apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Staging overlay: single replica of each workload, staging image tags.
namespace: invoice-platform-staging

resources:
  - ../../base

images:
  - name: invoice-platform-backend
    newTag: staging
  - name: invoice-platform-frontend
    newTag: staging

replicas:
  - name: backend
    count: 1
  - name: worker
    count: 1
  - name: frontend
    count: 1

patches:
  # Point the shared config at the staging environment.
  - target:
      kind: ConfigMap
      name: invoice-platform-config
    patch: |-
      - op: replace
        path: /data/APP_ENV
        value: staging
