apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  labels:
    app.kubernetes.io/name: worker
    app.kubernetes.io/part-of: invoice-platform
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: worker
      app.kubernetes.io/part-of: invoice-platform
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worker
        app.kubernetes.io/part-of: invoice-platform
        app.kubernetes.io/component: worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: invoice-platform-backend:latest
          imagePullPolicy: IfNotPresent
          # Background queue consumer: no ports, no HTTP health endpoint.
          command: ["python", "-m", "app.worker"]
          envFrom:
            - configMapRef:
                name: invoice-platform-config
            - secretRef:
                name: invoice-platform-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: local-storage
              mountPath: /app/.local-storage
      volumes:
        - name: tmp
          emptyDir: {}
        - name: local-storage
          emptyDir: {}
