apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base manifests for the invoice platform. Environment-specific values
# (namespace, image tags, replica counts, APP_ENV) are applied by the overlays
# under ../overlays/{staging,production}.
#
# NOTE: Postgres and Redis are assumed to be EXTERNAL managed services reached
# via DATABASE_URL / REDIS_URL in the Secret; there are intentionally no
# StatefulSets for them here.

namespace: invoice-platform

commonLabels:
  app.kubernetes.io/part-of: invoice-platform

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.example.yaml
  - backend-deployment.yaml
  - backend-service.yaml
  - worker-deployment.yaml
  - frontend-deployment.yaml
  - frontend-service.yaml
  - ingress.yaml
  - hpa.yaml
  - migration-job.yaml

images:
  - name: invoice-platform-backend
    newTag: latest
  - name: invoice-platform-frontend
    newTag: latest
