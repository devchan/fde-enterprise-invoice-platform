# EXAMPLE ONLY — do NOT commit real secrets.
#
# This manifest documents the secret keys the backend/worker require. In a real
# cluster, DO NOT apply this file with plaintext values. Instead manage these
# with a secret manager or sealed secrets, e.g.:
#   - Bitnami Sealed Secrets (kubeseal)
#   - External Secrets Operator (AWS Secrets Manager / GCP Secret Manager / Vault)
#   - SOPS-encrypted manifests
#
# Postgres and Redis are treated as EXTERNAL managed services: their connection
# strings arrive here via DATABASE_URL / REDIS_URL. No in-cluster StatefulSet.
apiVersion: v1
kind: Secret
metadata:
  name: invoice-platform-secrets
  labels:
    app.kubernetes.io/part-of: invoice-platform
type: Opaque
stringData:
  JWT_SECRET: "replace-with-strong-production-secret"
  DATABASE_URL: "postgresql+psycopg://invoice_user:replace-with-password@managed-postgres-host:5432/invoice_platform"
  REDIS_URL: "redis://managed-redis-host:6379/0"
  OPENAI_API_KEY: "replace-with-production-openai-key"
  OBJECT_STORAGE_ACCESS_KEY_ID: "replace-with-production-access-key"
  OBJECT_STORAGE_SECRET_ACCESS_KEY: "replace-with-production-secret-key"
